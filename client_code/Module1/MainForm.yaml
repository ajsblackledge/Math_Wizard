components:
  - name: column_panel_outer
    type: ColumnPanel
    properties:
      background: "#f3f4f6"
      full_width_row: true
    components:
      # Phone-frame wrapper: centred 390px wide column
      - name: card_phone
        type: Card
        layout_properties:
          full_width_row: false
          width_xs: 12
          width_sm: 8
          width_md: 5
          width_lg: 4
          offset_sm: 2
          offset_md: 3
          offset_lg: 4
        properties:
          background: "#ffffff"
        components:
          - name: content_panel
            type: ColumnPanel
            properties:
              spacing: none
