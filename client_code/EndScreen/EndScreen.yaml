components:
  - name: column_panel_root
    type: ColumnPanel
    components:

      # ── Topic label (top right) ──────────────────────────────────────────────
      - name: lbl_topic
        type: Label
        properties:
          text: ""
          foreground: "#6b7280"
          font_size: 11
          align: right
          spacing_above: none
          spacing_below: medium

      # ── Status section ───────────────────────────────────────────────────────
      - name: lbl_status_icon
        type: Label
        properties:
          text: "🏆"
          font_size: 40
          align: center
          spacing_below: none

      - name: lbl_status_title
        type: Label
        properties:
          text: "Quiz complete!"
          foreground: "#6b7280"
          font_size: 15
          align: center
          spacing_above: small
          spacing_below: none

      - name: lbl_score_label
        type: Label
        properties:
          text: "You scored"
          font_size: 18
          bold: true
          align: center
          spacing_above: small
          spacing_below: none

      - name: lbl_score
        type: Label
        properties:
          text: "0"
          font_size: 56
          bold: true
          align: center
          spacing_above: none
          spacing_below: none

      - name: lbl_points
        type: Label
        properties:
          text: "points"
          foreground: "#6b7280"
          font_size: 13
          align: center
          spacing_above: none
          spacing_below: large

      # ── Stats grid (3 columns) ───────────────────────────────────────────────
      - name: flow_stats
        type: FlowPanel
        properties:
          spacing: small
        components:

          - name: card_lives
            type: ColumnPanel
            properties:
              background: "#f9fafb"
              border: "1px solid #e5e7eb"
            components:
              - name: lbl_stat_lives_icon
                type: Label
                properties:
                  text: "❤️"
                  font_size: 18
                  align: center
                  spacing_below: none
              - name: lbl_stat_lives_val
                type: Label
                properties:
                  text: "3/3"
                  font_size: 15
                  bold: true
                  align: center
                  spacing_above: none
                  spacing_below: none
              - name: lbl_stat_lives_lbl
                type: Label
                properties:
                  text: "Lives"
                  foreground: "#6b7280"
                  font_size: 11
                  align: center
                  spacing_above: none

          - name: card_correct
            type: ColumnPanel
            properties:
              background: "#f9fafb"
              border: "1px solid #e5e7eb"
            components:
              - name: lbl_stat_correct_icon
                type: Label
                properties:
                  text: "✅"
                  font_size: 18
                  align: center
                  spacing_below: none
              - name: lbl_stat_correct_val
                type: Label
                properties:
                  text: "0/10"
                  font_size: 15
                  bold: true
                  align: center
                  spacing_above: none
                  spacing_below: none
              - name: lbl_stat_correct_lbl
                type: Label
                properties:
                  text: "Correct"
                  foreground: "#6b7280"
                  font_size: 11
                  align: center
                  spacing_above: none

          - name: card_time
            type: ColumnPanel
            properties:
              background: "#f9fafb"
              border: "1px solid #e5e7eb"
            components:
              - name: lbl_stat_time_icon
                type: Label
                properties:
                  text: "🕐"
                  font_size: 18
                  align: center
                  spacing_below: none
              - name: lbl_stat_time_val
                type: Label
                properties:
                  text: "0s"
                  font_size: 15
                  bold: true
                  align: center
                  spacing_above: none
                  spacing_below: none
              - name: lbl_stat_time_lbl
                type: Label
                properties:
                  text: "Time used"
                  foreground: "#6b7280"
                  font_size: 11
                  align: center
                  spacing_above: none

      # ── Accuracy bar ─────────────────────────────────────────────────────────
      - name: flow_accuracy_header
        type: FlowPanel
        properties:
          spacing: none
        components:
          - name: lbl_accuracy_label
            type: Label
            properties:
              text: "Accuracy"
              foreground: "#6b7280"
              font_size: 13

          - name: lbl_accuracy_pct
            type: Label
            properties:
              text: "0%"
              bold: true
              font_size: 13
              align: right

      - name: accuracy_bar
        type: LinearProgress
        properties:
          value: 0
          max: 100
          height: 10
          spacing_below: large

      # ── Home button ──────────────────────────────────────────────────────────
      - name: btn_home
        type: Button
        properties:
          text: "Back to home"
          role: primary-color
          full_width_row: true
          font_size: 15
          bold: true
        event_bindings:
          click: btn_home_click

events:
  - name: home_clicked
    description: Fired when the user taps "Back to home".
