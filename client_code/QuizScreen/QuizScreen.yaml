components:
  - name: column_panel_root
    type: ColumnPanel
    components:

      # ── Header row: exit | topic label ──────────────────────────────────────
      - name: flow_header
        type: FlowPanel
        properties:
          spacing: small
        components:
          - name: btn_exit
            type: Button
            properties:
              text: "✕"
              role: secondary-color
              font_size: 16
            event_bindings:
              click: btn_exit_click

          - name: lbl_topic_header
            type: Label
            properties:
              text: ""
              foreground: "#6b7280"
              font_size: 12
              align: right

      # ── Stats row: lives | score | timer ────────────────────────────────────
      - name: flow_stats
        type: FlowPanel
        properties:
          spacing: large
        components:
          - name: lbl_lives
            type: Label
            properties:
              text: "❤️ ❤️ ❤️"
              font_size: 18

          - name: lbl_score
            type: Label
            properties:
              text: "⭐ 0"
              font_size: 16
              bold: true

          - name: lbl_timer
            type: Label
            properties:
              text: "90s"
              font_size: 16
              bold: true
              foreground: "#111827"

      # ── Progress bar ─────────────────────────────────────────────────────────
      - name: progress_bar
        type: LinearProgress
        properties:
          value: 0
          max: 100
          striped: false
          animated: false
          height: 8

      - name: lbl_progress
        type: Label
        properties:
          text: "Question 1 of 10"
          foreground: "#6b7280"
          font_size: 11
          spacing_above: none
          spacing_below: medium

      # ── Question text ────────────────────────────────────────────────────────
      - name: lbl_question
        type: Label
        properties:
          text: ""
          bold: true
          font_size: 20
          spacing_below: large

      # ── Answer buttons ───────────────────────────────────────────────────────
      - name: btn_a
        type: Button
        properties:
          text: "A   —"
          full_width_row: true
          font_size: 14
          role: raised
          spacing_below: small
          background: "#ffffff"
          foreground: "#111827"
          border: "2px solid #e5e7eb"
        event_bindings:
          click: btn_a_click

      - name: btn_b
        type: Button
        properties:
          text: "B   —"
          full_width_row: true
          font_size: 14
          role: raised
          spacing_below: small
          background: "#ffffff"
          foreground: "#111827"
          border: "2px solid #e5e7eb"
        event_bindings:
          click: btn_b_click

      - name: btn_c
        type: Button
        properties:
          text: "C   —"
          full_width_row: true
          font_size: 14
          role: raised
          spacing_below: small
          background: "#ffffff"
          foreground: "#111827"
          border: "2px solid #e5e7eb"
        event_bindings:
          click: btn_c_click

      - name: btn_d
        type: Button
        properties:
          text: "D   —"
          full_width_row: true
          font_size: 14
          role: raised
          spacing_below: medium
          background: "#ffffff"
          foreground: "#111827"
          border: "2px solid #e5e7eb"
        event_bindings:
          click: btn_d_click

      # ── Hidden timer component ───────────────────────────────────────────────
      - name: timer_component
        type: Timer
        properties:
          interval: 0
          enabled: false
        event_bindings:
          tick: timer_component_tick

events:
  - name: quiz_ended
    description: "Fired when quiz finishes. Passes result dict: {score, reason, correct_count, time_left, time_used}"
  - name: exit_clicked
    description: Fired when user taps the exit (✕) button.
